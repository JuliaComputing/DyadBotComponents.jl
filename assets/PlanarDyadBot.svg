<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <!-- Ground line -->
  <line x1="80" y1="820" x2="920" y2="820" stroke="#333" stroke-width="6"/>
  <!-- Ground hatching -->
  <line x1="160" y1="820" x2="130" y2="860" stroke="#333" stroke-width="3"/>
  <line x1="280" y1="820" x2="250" y2="860" stroke="#333" stroke-width="3"/>
  <line x1="400" y1="820" x2="370" y2="860" stroke="#333" stroke-width="3"/>
  <line x1="520" y1="820" x2="490" y2="860" stroke="#333" stroke-width="3"/>
  <line x1="640" y1="820" x2="610" y2="860" stroke="#333" stroke-width="3"/>
  <line x1="760" y1="820" x2="730" y2="860" stroke="#333" stroke-width="3"/>
  <line x1="880" y1="820" x2="850" y2="860" stroke="#333" stroke-width="3"/>
  <!-- Wheel -->
  <circle cx="500" cy="670" r="150" fill="#e0e0e0" stroke="#333" stroke-width="6"/>
  <circle cx="500" cy="670" r="115" fill="#f5f5f5" stroke="#333" stroke-width="3"/>
  <!-- Spokes -->
  <line x1="500" y1="555" x2="500" y2="785" stroke="#999" stroke-width="4"/>
  <line x1="385" y1="670" x2="615" y2="670" stroke="#999" stroke-width="4"/>
  <!-- Hub -->
  <circle cx="500" cy="670" r="30" fill="#999" stroke="#333" stroke-width="4"/>
  <!-- Tilted pendulum body -->
  <line x1="500" y1="670" x2="620" y2="220" stroke="#333" stroke-width="10"/>
  <rect x="540" y="80" width="180" height="200" rx="20" transform="rotate(15 630 180)" fill="#007fff" stroke="#005fbf" stroke-width="5"/>
  <!-- Tilt-angle arc -->
  <path d="M 500 500 A 170 170 0 0 1 545 500" fill="none" stroke="#c33" stroke-width="5"/>
  <line x1="500" y1="670" x2="500" y2="480" stroke="#c33" stroke-width="4" stroke-dasharray="14,10"/>
</svg>
