<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000">
  <!-- Ground line -->
  <line x1="80" y1="820" x2="920" y2="820" stroke="#333" stroke-width="6"/>
  <!-- Ground hatching -->
  <line x1="160" y1="820" x2="130" y2="860" stroke="#333" stroke-width="3"/>
  <line x1="280" y1="820" x2="250" y2="860" stroke="#333" stroke-width="3"/>
  <line x1="400" y1="820" x2="370" y2="860" stroke="#333" stroke-width="3"/>
  <line x1="520" y1="820" x2="490" y2="860" stroke="#333" stroke-width="3"/>
  <line x1="640" y1="820" x2="610" y2="860" stroke="#333" stroke-width="3"/>
  <line x1="760" y1="820" x2="730" y2="860" stroke="#333" stroke-width="3"/>
  <line x1="880" y1="820" x2="850" y2="860" stroke="#333" stroke-width="3"/>
  <!-- Far wheel (right, seen in slight perspective) -->
  <ellipse cx="640" cy="655" rx="120" ry="165" fill="#cccccc" stroke="#333" stroke-width="5"/>
  <!-- Axle -->
  <line x1="360" y1="655" x2="640" y2="655" stroke="#333" stroke-width="10"/>
  <!-- Near wheel (left) -->
  <ellipse cx="360" cy="655" rx="120" ry="165" fill="#e0e0e0" stroke="#333" stroke-width="6"/>
  <ellipse cx="360" cy="655" rx="85" ry="125" fill="#f5f5f5" stroke="#333" stroke-width="3"/>
  <circle cx="360" cy="655" r="28" fill="#999" stroke="#333" stroke-width="4"/>
  <!-- Tilted pendulum body from axle center -->
  <line x1="500" y1="655" x2="580" y2="250" stroke="#333" stroke-width="10"/>
  <rect x="500" y="110" width="170" height="190" rx="20" transform="rotate(11 585 205)" fill="#007fff" stroke="#005fbf" stroke-width="5"/>
</svg>
